spring.application.name=product
haru.security.oauth2.client-id=${KEYCLOAK_CLIENT_ID:haru-api}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost/auth/realms/haru}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost/auth/realms/haru/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.audiences=${KEYCLOAK_AUDIENCE:haru-api}

springdoc.paths-to-match=/api/**
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=false

haru.search.elasticsearch.url=${HARU_SEARCH_ELASTICSEARCH_URL:http://localhost:9200}
haru.search.elasticsearch.products-index=${HARU_SEARCH_PRODUCTS_INDEX:haru-products-v1}
haru.search.elasticsearch.reindex-on-startup=${HARU_SEARCH_REINDEX_ON_STARTUP:false}
haru.search.elasticsearch.connect-timeout=${HARU_SEARCH_CONNECT_TIMEOUT:2s}
haru.search.elasticsearch.read-timeout=${HARU_SEARCH_READ_TIMEOUT:5s}

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false
