user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;
    sendfile on;

    log_format upstream_log '$remote_addr - $request $status '
                            'upstream=$upstream_addr response_time=$upstream_response_time';
    access_log /var/log/nginx/access.log upstream_log;

    map $http_x_forwarded_proto $forwarded_proto_from_header {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    map $http_x_forwarded_port $forwarded_port_from_header {
        default $http_x_forwarded_port;
        "" $server_port;
    }

    map $host $forwarded_proto {
        default $forwarded_proto_from_header;
        ~\.app\.github\.dev$ https;
    }

    map $host $forwarded_port {
        default $forwarded_port_from_header;
        ~\.app\.github\.dev$ 443;
    }

    upstream spring_api {
        least_conn;
        server api-1:8080;
        server api-2:8080;
        keepalive 32;
    }

    upstream keycloak_server {
        server keycloak:8080;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 10m;

        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 'ok\n';
        }

        location = /auth {
            return 301 /auth/;
        }

        location /auth/ {
            proxy_pass http://keycloak_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location / {
            proxy_pass http://spring_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
