name: haru-produto-api

x-api-common: &api-common
  build:
    context: ..
    dockerfile: docker/app/Dockerfile
  restart: unless-stopped
  expose:
    - "8080"
  environment: &api-environment
    SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    SERVER_PORT: 8080
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${APP_DB_NAME:-haru_produto}
    SPRING_DATASOURCE_USERNAME: ${APP_DB_USER:-haru}
    SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD:-haru_local_password}
    HARU_SECURITY_OAUTH2_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-haru-api}
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost/auth}/realms/${KEYCLOAK_REALM:-haru}
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-haru}/protocol/openid-connect/certs
    JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport}
  depends_on:
    postgres:
      condition: service_healthy
    keycloak:
      condition: service_healthy
  networks:
    - backend

services:
  postgres:
    build:
      context: ./PostgresSQL
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_local_password}
      APP_DB_NAME: ${APP_DB_NAME:-haru_produto}
      APP_DB_USER: ${APP_DB_USER:-haru}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-haru_local_password}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_local_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  keycloak:
    build:
      context: ./Keycloak
      dockerfile: Dockerfile
      args:
        KEYCLOAK_VERSION: ${KEYCLOAK_VERSION:-26.3.3}
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_local_password}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_local_password}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost/auth}
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./Keycloak/realm:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          exec 3<>/dev/tcp/127.0.0.1/9000 &&
          printf 'GET /auth/health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          grep -q '200 OK' <&3
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - backend

  api-1:
    <<: *api-common
    environment:
      <<: *api-environment
      INSTANCE_ID: api-1

  api-2:
    <<: *api-common
    environment:
      <<: *api-environment
      INSTANCE_ID: api-2

  nginx:
    build:
      context: ./Nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api-1
      - api-2
      - keycloak
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
